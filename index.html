<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAIPENG HLA BU - PRO</title>
    <style>
        :root { 
            --app-bg: #f8fafc; --card-bg: #ffffff; --primary: #1e293b;
            --accent: #b08d6d; --border: #e2e8f0; --text: #1e293b; --whatsapp: #25D366; --danger: #ef4444;
        }
        .dark-mode {
            --app-bg: #0f172a; --card-bg: #1e293b; --border: #334155; --text: #f1f5f9;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #2c3e50; margin: 0; height: 100dvh; display: flex; justify-content: center; overflow: hidden; color: var(--text); }
        .shell { width: 100%; max-width: 450px; height: 100%; background: var(--app-bg); display: flex; flex-direction: column; position: relative; }
        .header { padding: 20px; flex-shrink: 0; z-index: 10; }
        #mainScroll { flex: 1; overflow-y: auto; padding: 0 20px 100px; scroll-behavior: smooth; }
        .item { background: var(--card-bg); padding: 18px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; align-items: center; cursor: pointer; }
        .item-no { width: 50px; font-weight: 800; color: var(--accent); font-size: 1.2rem; }
        .tabs { position: absolute; bottom: 0; width: 100%; background: var(--card-bg); display: flex; border-top: 1px solid var(--border); padding: 12px 0; z-index: 1000; }
        .tab { flex: 1; text-align: center; font-size: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; color: var(--text); opacity: 0.4; }
        .tab.active { opacity: 1; color: var(--accent); }
        .tab span { font-size: 1.5rem; display: block; margin-bottom: 2px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .input, select, textarea { width: 100%; padding: 15px; margin: 5px 0 15px; border-radius: 8px; border: 1px solid var(--border); font-size: 1rem; background: var(--card-bg); color: var(--text); font-family: inherit; }
        textarea { height: 120px; }
        .full-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--app-bg); z-index: 5000; display: none; flex-direction: column; }
        .fs-header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .admin-section { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .footer-text { padding: 15px; text-align: center; font-size: 0.7rem; opacity: 0.5; border-top: 1px solid var(--border); }
        .viewer-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--card-bg); border-bottom: 1px solid var(--border); }
        .v-btn { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--app-bg); color: var(--text); font-weight: bold; cursor: pointer; }
        #vText, #vImage { transition: all 0.2s ease-out; transform-origin: top center; }
        #vImage { width: 100%; border-radius: 10px; margin-top: 20px; display: block; }
        #saveMsg { color: #22c55e; font-weight: bold; display: none; margin-top: 10px; text-align: center; font-size: 1.1rem; }
    </style>
</head>
<body onload="initApp()">

<div class="shell">
    <div class="header" id="appHeader">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b style="font-size:1.8rem; letter-spacing:-1px;">HLA BU</b>
            <div onclick="toggleTheme()" style="cursor:pointer; font-size:1.5rem;">🌓</div>
        </div>
        <input type="text" id="search" placeholder="Search by number or title..." oninput="handleSearch()" class="input" style="margin:0;">
    </div>

    <div id="mainScroll">
        <div id="homeUI">
            <div style="background:var(--accent); color:white; padding:60px 20px; border-radius:24px; text-align:center;">
                <h2 id="displayQuote" style="font-style:italic; font-size: 1.6rem; margin:0;">"Lalpa chu hlim takin fak rawh u"</h2>
            </div>
            
            <div style="margin-top:25px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;" id="homeGrid"></div>

            <div class="footer-text" style="border:none;">© 2026 KAIPENG HLA BU | KAIPENG EDITION</div>
        </div>

        <div id="settingsUI" style="display:none; padding-top: 10px;">
            <h3>Settings</h3>
            <button onclick="toggleTheme()" class="btn" style="background:var(--card-bg); border:1px solid var(--border); margin-bottom:15px;">Switch Theme</button>
            <div class="admin-section" style="padding:15px; border-color:var(--whatsapp);">
                <b style="color:var(--whatsapp);">Song Improvement</b>
                <button onclick="window.open('https://wa.me/919361094788?text=Suggestion')" class="btn" style="background:var(--whatsapp); color:white; margin-top:10px;">Contact 9361094788</button>
            </div>
            <button onclick="nav('admin')" class="btn" style="background:var(--primary); color:white;">Admin Panel</button>
        </div>

        <div id="adminLoginUI" style="display:none; text-align:center; padding-top:40px;">
            <h3>Admin Access</h3>
            <input type="password" id="adminPass" placeholder="Enter Password" class="input">
            <button onclick="checkPass()" class="btn" style="background:var(--accent); color:white;">Login</button>
        </div>

        <div id="adminPanelUI" style="display:none; padding-bottom: 50px;">
            <div style="display:flex; justify-content:space-between; align-items:center;"><h3>Dashboard</h3><button onclick="logout()" style="background:var(--danger); color:white; border:none; padding:5px 10px; border-radius:5px;">Logout</button></div>
            
            <div class="admin-section">
                <b>Home Quote</b>
                <input type="text" id="quoteInput" placeholder="Enter Home Quote" class="input">
                <button onclick="updateQuote()" class="btn" style="background:var(--primary); color:white;">Update Quote</button>
            </div>

            <div class="admin-section">
                <b>Add Song</b>
                <input type="number" id="sNo" placeholder="Song Number" class="input">
                <input type="text" id="sTitle" placeholder="Song Title" class="input">
                <select id="sCat"></select>
                <textarea id="sLyrics" placeholder="Paste Lyrics Here..."></textarea>
                <input type="file" id="sImg" accept="image/*" class="input">
                <button onclick="saveSong()" class="btn" id="saveBtn" style="background:var(--accent); color:white;">Save Song</button>
                <div id="saveMsg">Done ✅ Saved Successfully</div>
            </div>

            <div class="admin-section">
                <b>Category Editor</b>
                <input type="text" id="newCatName" placeholder="New Category Name" class="input">
                <button onclick="addCategory()" class="btn" style="background:var(--primary); color:white;">Add Category</button>
                <div id="catList" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:10px;"></div>
            </div>

            <div class="admin-section">
                <b>Data Management</b>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button onclick="exportData()" class="btn" style="background:#4ade80; color:white;">Output (Export)</button>
                    <button onclick="document.getElementById('importFile').click()" class="btn" style="background:#60a5fa; color:white;">Import File</button>
                </div>
                <input type="file" id="importFile" style="display:none;" onchange="importData(event)">
            </div>
        </div>
        <div id="listUI" style="display:none;"></div>
    </div>

    <div class="tabs">
        <div class="tab" id="nav-home" onclick="nav('home')"><span>🏠</span>HOME</div>
        <div class="tab" id="nav-songs" onclick="nav('songs')"><span>🎶</span>SONGS</div>
        <div class="tab" id="nav-favs" onclick="nav('favs')"><span>❤️</span>FAVS</div>
        <div class="tab" id="nav-settings" onclick="nav('settings')"><span>⚙️</span>SITTING</div>
    </div>

    <div id="viewer" class="full-screen">
        <div class="fs-header">
            <span id="vTitle"></span>
            <div style="display:flex; align-items:center; gap:15px;">
                <span id="vFavBtn" onclick="toggleFav()" style="cursor:pointer;">🤍</span>
                <button onclick="closeViewer()" style="color:white; background:none; border:none; font-size:1.5rem;">✕</button>
            </div>
        </div>
        <div class="viewer-nav">
            <button class="v-btn" onclick="navSong(-1)">◀ Prev</button>
            <div style="display:flex; gap:10px;">
                <button class="v-btn" onclick="zoom(-0.1)">A-</button>
                <button class="v-btn" onclick="zoom(0.1)">A+</button>
            </div>
            <button class="v-btn" onclick="navSong(1)">Next ▶</button>
        </div>
        <div id="vScroll" style="flex:1; overflow-x:hidden; overflow-y:auto; padding:20px; text-align:center;">
            <div id="vContent"></div>
        </div>
    </div>
</div>

<script>
    let songs = JSON.parse(localStorage.getItem('kp_songs')) || [];
    let cats = JSON.parse(localStorage.getItem('kp_cats')) || ["Hymn", "Chorus", "Youth", "Christmas"];
    let homeQuote = localStorage.getItem('kp_quote') || `"Lalpa chu hlim takin fak rawh u"`;
    let isAdmin = sessionStorage.getItem('isAdmin') === 'true';
    let currentSongIndex = -1;
    let currentScale = 1.1;

    function initApp() { 
        renderCategories(); 
        document.getElementById('displayQuote').innerText = homeQuote;
        document.getElementById('quoteInput').value = homeQuote;
        nav('home'); 
    }
    
    function toggleTheme() { document.body.classList.toggle('dark-mode'); }

    function nav(p) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(document.getElementById('nav-'+p)) document.getElementById('nav-'+p).classList.add('active');
        const views = ['homeUI', 'listUI', 'settingsUI', 'adminLoginUI', 'adminPanelUI'];
        views.forEach(v => document.getElementById(v).style.display = 'none');
        document.getElementById('appHeader').style.display = (p === 'admin') ? 'none' : 'block';
        
        if(p === 'home') { document.getElementById('homeUI').style.display = 'block'; updateHomeGrid(); }
        else if(p === 'settings') document.getElementById('settingsUI').style.display = 'block';
        else if(p === 'admin') {
            document.getElementById('adminPanelUI').style.display = isAdmin ? 'block' : 'none';
            document.getElementById('adminLoginUI').style.display = isAdmin ? 'none' : 'block';
        }
        else {
            document.getElementById('listUI').style.display = 'block';
            if(p === 'songs') renderList(songs, "All Songs");
            if(p === 'favs') renderList(songs.filter(s => s.isFav), "Favorites ❤️");
        }
    }

    function updateQuote() {
        const newQuote = document.getElementById('quoteInput').value.trim();
        if(newQuote) {
            homeQuote = newQuote;
            localStorage.setItem('kp_quote', homeQuote);
            document.getElementById('displayQuote').innerText = homeQuote;
            alert("Quote Updated!");
        }
    }

    function updateHomeGrid() {
        const grid = document.getElementById('homeGrid');
        grid.innerHTML = `<div class="item" onclick="nav('songs')" style="flex-direction:column; padding:20px;"><span>🎶</span><b>ALL</b></div>`;
        cats.forEach(c => grid.innerHTML += `<div class="item" onclick="viewCat('${c}')" style="flex-direction:column; padding:20px;"><span>📂</span><b>${c.toUpperCase()}</b></div>`);
    }

    function viewCat(c) { nav('list'); renderList(songs.filter(s => s.cat === c), c); }

    function renderList(data, title) {
        const box = document.getElementById('listUI');
        box.innerHTML = `<h3 style="margin-bottom:20px;">${title}</h3>`;
        const sorted = [...data].sort((a,b) => a.no - b.no);
        sorted.forEach((s) => {
            let d = document.createElement('div'); d.className = 'item';
            d.innerHTML = `<div class="item-no">${s.no}</div><div style="flex:1"><b>${s.title}</b><br><small opacity="0.5">${s.cat}</small></div>`;
            d.onclick = () => openViewer(songs.indexOf(s));
            box.appendChild(d);
        });
    }

    function openViewer(index) {
        currentSongIndex = index;
        let song = songs[index];
        document.getElementById('vTitle').innerText = `${song.no}. ${song.title}`;
        document.getElementById('vFavBtn').innerText = song.isFav ? '❤️' : '🤍';
        let html = `<div id="vText" style="white-space:pre-wrap; text-align:left; line-height:1.6;">${song.content}</div>`;
        if(song.img) html += `<img id="vImage" src="${song.img}">`;
        document.getElementById('vContent').innerHTML = html;
        applyZoom();
        document.getElementById('viewer').style.display = 'flex';
        document.getElementById('vScroll').scrollTop = 0;
    }

    function zoom(val) { currentScale = Math.max(0.5, Math.min(4, currentScale + val)); applyZoom(); }
    function applyZoom() {
        const txt = document.getElementById('vText');
        const img = document.getElementById('vImage');
        if(txt) txt.style.fontSize = currentScale + 'rem';
        if(img) img.style.width = (currentScale * 90) + '%'; 
    }

    function toggleFav() {
        songs[currentSongIndex].isFav = !songs[currentSongIndex].isFav;
        document.getElementById('vFavBtn').innerText = songs[currentSongIndex].isFav ? '❤️' : '🤍';
        localStorage.setItem('kp_songs', JSON.stringify(songs));
    }

    function navSong(dir) { let newIdx = currentSongIndex + dir; if(newIdx >= 0 && newIdx < songs.length) openViewer(newIdx); }
    function closeViewer() { document.getElementById('viewer').style.display = 'none'; }
    function checkPass() { if(document.getElementById('adminPass').value === '1234') { isAdmin = true; sessionStorage.setItem('isAdmin', 'true'); nav('admin'); } else alert("Access Denied"); }
    function logout() { isAdmin = false; sessionStorage.removeItem('isAdmin'); nav('home'); }
    
    function renderCategories() {
        const sel = document.getElementById('sCat');
        if(sel) sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
        const list = document.getElementById('catList');
        if(list) list.innerHTML = cats.map(c => `<span style="background:var(--accent); color:white; padding:5px 10px; border-radius:20px; font-size:0.7rem; cursor:pointer;" onclick="removeCat('${c}')">${c} ✕</span>`).join('');
    }
    
    function addCategory() { const n = document.getElementById('newCatName').value.trim(); if(n && !cats.includes(n)) { cats.push(n); localStorage.setItem('kp_cats', JSON.stringify(cats)); renderCategories(); document.getElementById('newCatName').value = ''; } }
    function removeCat(c) { if(confirm(`Delete category: ${c}?`)) { cats = cats.filter(i => i !== c); localStorage.setItem('kp_cats', JSON.stringify(cats)); renderCategories(); } }

    async function saveSong() {
        const no = document.getElementById('sNo').value;
        const title = document.getElementById('sTitle').value;
        const content = document.getElementById('sLyrics').value;
        const imgFile = document.getElementById('sImg').files[0];
        if(!no || !title) return alert("Please enter Song Number and Title");
        let imgBase64 = "";
        if(imgFile) {
            imgBase64 = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(imgFile);
            });
        }
        songs.push({ no: parseInt(no), title: title.trim(), cat: document.getElementById('sCat').value, content: content.trim(), img: imgBase64, isFav: false });
        songs.sort((a,b) => a.no - b.no);
        localStorage.setItem('kp_songs', JSON.stringify(songs));
        const msg = document.getElementById('saveMsg');
        msg.style.display = 'block';
        setTimeout(() => { msg.style.display = 'none'; }, 2000);
        document.getElementById('sNo').value = ''; document.getElementById('sTitle').value = ''; document.getElementById('sLyrics').value = ''; document.getElementById('sImg').value = '';
    }

    function exportData() {
        const blob = new Blob([JSON.stringify({ songs, cats, quote: homeQuote })], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `KAIPENG_BACKUP.json`; a.click();
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const data = JSON.parse(event.target.result);
            if(data.songs) {
                songs = data.songs; cats = data.cats || cats;
                if(data.quote) localStorage.setItem('kp_quote', data.quote);
                localStorage.setItem('kp_songs', JSON.stringify(songs));
                localStorage.setItem('kp_cats', JSON.stringify(cats));
                location.reload();
            }
        };
        reader.readAsText(e.target.files[0]);
    }

    function handleSearch() {
        let q = document.getElementById('search').value.toLowerCase().trim();
        if(!q) return nav('home');
        nav('list');
        renderList(songs.filter(s => s.title.toLowerCase().includes(q) || s.no.toString() === q), "Search Results");
    }
</script>
</body>
</html>
