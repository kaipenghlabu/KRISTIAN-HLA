<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAIPENG HLA BU - UPDATED CONTACT</title>
    <style>
        :root { 
            --app-bg: #f8fafc; --card-bg: #ffffff; --primary: #1e293b;
            --accent: #b08d6d; --border: #e2e8f0; --text: #1e293b; --whatsapp: #25D366;
        }
        .dark-mode {
            --app-bg: #0f172a; --card-bg: #1e293b; --border: #334155; --text: #f1f5f9;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, sans-serif; background: #2c3e50; margin: 0; 
            height: 100dvh; display: flex; justify-content: center; overflow: hidden; color: var(--text);
        }

        .shell { width: 100%; max-width: 450px; height: 100%; background: var(--app-bg); display: flex; flex-direction: column; position: relative; }
        
        /* Headers */
        .header { padding: 20px; flex-shrink: 0; z-index: 10; }
        h3 { font-size: 1.6rem; margin: 15px 0; border-left: 5px solid var(--accent); padding-left: 10px; }

        #mainScroll { flex: 1; overflow-y: auto; padding: 0 20px 80px; }
        
        /* List Items */
        .item { 
            background: var(--card-bg); padding: 18px; border-radius: 12px; 
            margin-bottom: 12px; border: 1px solid var(--border);
            display: flex; align-items: center; cursor: pointer; font-size: 1.1rem;
        }
        .item:active { opacity: 0.7; transform: scale(0.98); }
        .item-no { width: 50px; font-weight: 800; color: var(--accent); font-size: 1.2rem; }

        /* Navigation Bar */
        .tabs { 
            position: absolute; bottom: 0; width: 100%; background: var(--card-bg);
            display: flex; border-top: 1px solid var(--border); padding: 12px 0; z-index: 1000;
        }
        .tab { flex: 1; text-align: center; font-size: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .tab span { font-size: 1.4rem; display: block; margin-bottom: 2px; }

        .full-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--app-bg); z-index: 5000; display: none; flex-direction: column; 
        }
        .fs-header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; }

        .btn { 
            width: 100%; padding: 15px; border-radius: 10px; border: none; 
            font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 1.1rem;
        }
        .input { width: 100%; padding: 15px; margin: 5px 0 15px; border-radius: 8px; border: 1px solid var(--border); font-size: 1.1rem; }

        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; 
        }
        .modal { background: var(--card-bg); width: 92%; padding: 25px; border-radius: 15px; max-height: 85vh; overflow-y: auto; }

        #zoomBox { transition: transform 0.2s ease; transform-origin: top center; width: 100%; }
        
        .contact-box {
            background: #e7fce3; border: 1px solid #c3e6cb; padding: 20px; border-radius: 12px; margin-top: 20px; text-align: center;
        }
        
        #favBtn { transition: 0.2s; font-size: 1.4rem; }
        .is-fav { color: #ff4757 !important; opacity: 1 !important; filter: drop-shadow(0 0 5px rgba(255,71,87,0.3)); }
    </style>
</head>
<body onload="startup()">

<div class="shell">
    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b style="font-size:1.8rem;">HLA BU</b>
            <button onclick="document.body.classList.toggle('dark-mode')" style="background:none; border:none; font-size:1.8rem;">🌓</button>
        </div>
        <input type="text" id="search" placeholder="Search number or title..." oninput="doSearch()" class="input" style="margin:0;">
    </div>

    <div id="mainScroll">
        <div id="homeUI" style="text-align:center; padding:40px 0;">
            <div style="background:var(--accent); color:white; padding:50px 20px; border-radius:20px;">
                <h2 style="font-style:italic; font-size: 1.8rem; margin:0;">"Lalpa chu fak rawh u"</h2>
            </div>
        </div>
        <div id="listUI"></div>
    </div>

    <div class="tabs">
        <div class="tab" onclick="nav('home')"><span>🏠</span>HOME</div>
        <div class="tab" onclick="nav('songs')"><span>🎶</span>SONGS</div>
        <div class="tab" onclick="nav('cats')"><span>📂</span>CATS</div>
        <div class="tab" onclick="nav('favs')"><span>❤️</span>FAVS</div>
        <div class="tab" onclick="nav('admin')"><span>⚙️</span>ADMIN</div>
    </div>

    <!-- Viewer -->
    <div id="viewer" class="full-screen">
        <div class="fs-header">
            <span id="vTitle" style="font-weight:bold;"></span>
            <button onclick="closeAll()" style="color:white; background:none; border:none; font-size:1.8rem;">✕</button>
        </div>
        <div style="display:flex; justify-content:space-between; padding:10px; background:var(--card-bg); border-bottom:1px solid var(--border);">
            <button onclick="move(-1)" class="btn" style="width:60px; margin:0; background:var(--app-bg);">←</button>
            <div style="display:flex; gap:8px;">
                <button onclick="zoom(-0.2)" class="btn" style="width:55px; margin:0; background:var(--app-bg);">A-</button>
                <button onclick="zoom(0.2)" class="btn" style="width:55px; margin:0; background:var(--app-bg);">A+</button>
                <button id="favBtn" onclick="toggleFav()" class="btn" style="width:55px; margin:0; background:var(--app-bg); opacity: 0.3;">❤️</button>
            </div>
            <button onclick="move(1)" class="btn" style="width:60px; margin:0; background:var(--app-bg);">→</button>
        </div>
        <div style="flex:1; overflow:auto; padding:25px; text-align:center;">
            <div id="zoomBox"></div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="full-screen">
        <div class="fs-header"><b>Admin Tools</b><button onclick="closeAll()" style="color:white; background:none; border:none; font-size:1.8rem;">✕</button></div>
        <div style="padding:20px; overflow-y:auto;">
            <div id="locked">
                <button class="btn" style="background:var(--primary); color:white; height:70px; font-size:1.3rem;" onclick="pop('pinPop')">Admin Login</button>
            </div>
            <div id="unlocked" style="display:none;">
                <button class="btn" style="background:var(--accent); color:white;" onclick="openEdit(-1)">+ Add New Song</button>
                <div style="background:var(--card-bg); padding:15px; border-radius:10px; border:1px solid var(--border); margin:15px 0;">
                    <b style="font-size:14px; color:var(--accent); text-transform:uppercase;">Category Manager</b>
                    <div id="catAdminList" style="margin:10px 0;"></div>
                    <div style="display:flex; gap:5px;">
                        <input id="catNewIn" class="input" placeholder="New Cat Name" style="margin:0;">
                        <button onclick="saveCat()" class="btn" style="width:80px; margin:0; background:var(--primary); color:white;">Add</button>
                    </div>
                </div>
                <button class="btn" style="background:#10b981; color:white;" onclick="exportData()">Export Backup</button>
                <button class="btn" style="background:#3b82f6; color:white;" onclick="document.getElementById('importIn').click()">Import Backup</button>
                <input type="file" id="importIn" style="display:none;" onchange="importData(this)">
                <button class="btn" style="background:#ef4444; color:white; margin-top:20px;" onclick="doLogout()">Logout Admin</button>
            </div>
            <!-- UPDATED WHATSAPP SECTION -->
            <div class="contact-box">
                <p style="font-size: 1.1rem; color: #155724; margin-top:0;"><b>Found a mistake?</b><br>Suggest improvements</p>
                <button onclick="window.open('https://wa.me/919361094788?text=Song%20Improvement')" class="btn" style="background:var(--whatsapp); color:white; margin:0;">
                    💬 Contact Developer
                </button>
            </div>
        </div>
    </div>
</div>

<!-- MODALS REMAIN SAME -->
<div id="pinPop" class="overlay"><div class="modal">...</div></div>
<div id="editPop" class="overlay"><div class="modal">...</div></div>

<script>
    let songs = JSON.parse(localStorage.getItem('kp_songs')) || [];
    let cats = JSON.parse(localStorage.getItem('kp_cats')) || ["Hymn", "Choir", "Youth"];
    let authed = false, currentIdx = -1, viewList = [], scale = 1, tempImg = "";

    function startup() { updateCatDropdown(); viewList = [...songs]; }

    function nav(p) {
        document.getElementById('homeUI').style.display = (p==='home') ? 'block' : 'none';
        document.getElementById('listUI').style.display = (p==='home') ? 'none' : 'block';
        closeAll();
        if(p==='songs') { viewList = [...songs]; render(viewList, "All Songs"); }
        if(p==='cats') renderCats();
        if(p==='favs') { viewList = songs.filter(s => s.isFav === true); render(viewList, "My Favorites ❤️"); }
        if(p==='admin') document.getElementById('adminPanel').style.display = 'flex';
    }

    function render(data, title) {
        const box = document.getElementById('listUI');
        box.innerHTML = `<h3>${title}</h3>`;
        if(data.length === 0) box.innerHTML += `<p style="text-align:center; opacity:0.5; margin-top:20px; font-size:1.2rem;">No songs found.</p>`;
        data.forEach(s => {
            let d = document.createElement('div');
            d.className = 'item';
            d.innerHTML = `<div class="item-no">${s.no}</div><div style="flex:1"><b>${s.type==='img'?'🖼️ ':''}${s.title}</b></div>`;
            d.onclick = () => { viewList = data; openView(songs.indexOf(s)); };
            if(authed) {
                let e = document.createElement('span'); e.innerHTML = "✎"; e.style.padding="10px"; e.style.fontSize="1.3rem";
                e.onclick = (ev) => { ev.stopPropagation(); openEdit(songs.indexOf(s)); };
                d.appendChild(e);
            }
            box.appendChild(d);
        });
    }

    function renderCats() {
        const box = document.getElementById('listUI');
        box.innerHTML = `<h3>Categories</h3>`;
        cats.forEach(c => {
            let d = document.createElement('div');
            d.className = 'item';
            d.innerHTML = `<div style="flex:1; font-weight:bold;">${c}</div><div style="opacity:0.5">→</div>`;
            d.onclick = () => { let filtered = songs.filter(s => s.cat === c); render(filtered, c); };
            box.appendChild(d);
        });
    }

    function openView(idx) {
        currentIdx = idx; scale = 1;
        let s = songs[idx];
        document.getElementById('vTitle').innerText = s.no + ". " + s.title;
        const fBtn = document.getElementById('favBtn');
        if(s.isFav) fBtn.classList.add('is-fav'); else fBtn.classList.remove('is-fav');
        let b = document.getElementById('zoomBox');
        b.style.transform = `scale(1)`;
        if(s.type === 'img') b.innerHTML = `<img src="${s.content}" style="width:100%;">`;
        else b.innerHTML = `<div style="white-space:pre-wrap; font-size:1.3rem; line-height:1.6; text-align:left;">${s.content}</div>`;
        document.getElementById('viewer').style.display = 'flex';
    }

    function toggleFav() {
        if(currentIdx === -1) return;
        songs[currentIdx].isFav = !songs[currentIdx].isFav;
        localStorage.setItem('kp_songs', JSON.stringify(songs));
        const fBtn = document.getElementById('favBtn');
        if(songs[currentIdx].isFav) fBtn.classList.add('is-fav'); else fBtn.classList.remove('is-fav');
    }

    function zoom(v) { scale += v; scale = Math.max(0.5, Math.min(3, scale)); document.getElementById('zoomBox').style.transform = `scale(${scale})`; }
    function move(d) {
        let cur = viewList.indexOf(songs[currentIdx]);
        let nxt = cur + d;
        if(nxt >= 0 && nxt < viewList.length) openView(songs.indexOf(viewList[nxt]));
    }
    function checkPin() { if(document.getElementById('pinField').value === "1234") { authed = true; document.getElementById('unlocked').style.display = 'block'; document.getElementById('locked').style.display = 'none'; hide('pinPop'); renderCatAdmin(); } else alert("Wrong PIN"); }
    function doLogout() { authed = false; document.getElementById('unlocked').style.display = 'none'; document.getElementById('locked').style.display = 'block'; nav('home'); }
    function openEdit(idx) {
        document.getElementById('editIdx').value = idx;
        tempImg = ""; document.getElementById('ePreview').src = "";
        if(idx > -1) {
            let s = songs[idx]; document.getElementById('eNo').value = s.no; document.getElementById('eTitle').value = s.title; document.getElementById('eCat').value = s.cat;
            if(s.type === 'img') { document.querySelector('input[value="img"]').checked = true; setMode('img'); tempImg = s.content; document.getElementById('ePreview').src = s.content; }
            else { document.querySelector('input[value="text"]').checked = true; setMode('text'); document.getElementById('eLyrics').value = s.content; }
            document.getElementById('delBtn').style.display = 'block';
        } else { document.getElementById('eNo').value = ""; document.getElementById('eTitle').value = ""; document.getElementById('delBtn').style.display = 'none'; setMode('text'); }
        pop('editPop');
    }
    function saveSong() {
        let idx = document.getElementById('editIdx').value; let mode = document.querySelector('input[name="m"]:checked').value;
        let content = (mode === 'text') ? document.getElementById('eLyrics').value : tempImg; if(!content) return alert("Content cannot be empty");
        let existingFav = (idx > -1 && songs[idx]) ? songs[idx].isFav : false;
        let obj = { no: document.getElementById('eNo').value, title: document.getElementById('eTitle').value, cat: document.getElementById('eCat').value, type: mode, content: content, isFav: existingFav };
        if(idx > -1) songs[idx] = obj; else songs.push(obj);
        songs.sort((a,b) => parseInt(a.no) - parseInt(b.no)); localStorage.setItem('kp_songs', JSON.stringify(songs)); hide('editPop'); nav('songs');
    }
    function saveCat() { let n = document.getElementById('catNewIn').value; if(n) { cats.push(n); localStorage.setItem('kp_cats', JSON.stringify(cats)); document.getElementById('catNewIn').value = ""; renderCatAdmin(); updateCatDropdown(); } }
    function renderCatAdmin() { document.getElementById('catAdminList').innerHTML = cats.map((c, i) => `<div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid var(--border); font-size:1.1rem;">${c} <span onclick="delCat(${i})" style="color:red; cursor:pointer; font-weight:bold;">✕</span></div>`).join(''); }
    function delCat(i) { if(confirm("Delete category?")) { cats.splice(i,1); localStorage.setItem('kp_cats', JSON.stringify(cats)); renderCatAdmin(); updateCatDropdown(); } }
    function setMode(m) { document.getElementById('eLyrics').style.display = (m==='text')?'block':'none'; document.getElementById('eImgArea').style.display = (m==='img')?'block':'none'; }
    function handleImg(i) { let r = new FileReader(); r.onload = e => { tempImg = e.target.result; document.getElementById('ePreview').src = tempImg; }; r.readAsDataURL(i.files[0]); }
    function doSearch() { let q = document.getElementById('search').value.toLowerCase(); if(!q) { nav('home'); return; } viewList = songs.filter(s => s.no.includes(q) || s.title.toLowerCase().includes(q)); render(viewList, "Results"); }
    function delSong() { if(confirm("Delete song permanently?")) { songs.splice(document.getElementById('editIdx').value, 1); localStorage.setItem('kp_songs', JSON.stringify(songs)); hide('editPop'); nav('songs'); } }
    function pop(id) { document.getElementById(id).style.display = 'flex'; }
    function hide(id) { document.getElementById(id).style.display = 'none'; }
    function closeAll() { document.getElementById('viewer').style.display = 'none'; document.getElementById('adminPanel').style.display = 'none'; }
    function updateCatDropdown() { document.getElementById('eCat').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join(''); }
    function exportData() { let b = new Blob([JSON.stringify({songs, cats})], {type:'application/json'}); let a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'hlabu_backup.json'; a.click(); }
    function importData(i) { let r = new FileReader(); r.onload = e => { try { let d = JSON.parse(e.target.result); songs = d.songs; cats = d.cats; localStorage.setItem('kp_songs', JSON.stringify(songs)); localStorage.setItem('kp_cats', JSON.stringify(cats)); location.reload(); } catch(err) { alert("Invalid Backup File"); } }; r.readAsText(i.files[0]); }
</script>
</body>
</html>
