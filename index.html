<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAIPENG HLA BU</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;600&family=Crimson+Pro:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --app-bg: #f8fafc; --card-bg: #ffffff; --primary-text: #1e293b;
            --secondary-text: #64748b; --accent: #b08d6d; --border: #f1f5f9;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }
        .dark-mode {
            --app-bg: #0f172a; --card-bg: #1e293b; --primary-text: #f1f5f9;
            --secondary-text: #94a3b8; --border: #334155;
        }
        body { font-family: 'Inter', sans-serif; background: #2c3e50; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: var(--primary-text); }
        .app-shell { width: 95%; max-width: 450px; height: 94vh; display: flex; flex-direction: column; position: relative; background: var(--app-bg); border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); overflow: hidden; transition: 0.3s; }

        /* SEARCH TOP */
        .top-nav { padding: 20px 20px 5px; }
        .search-box { background: var(--card-bg); border-radius: 18px; padding: 12px 18px; display: flex; align-items: center; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .search-box input { border: none; background: transparent; width: 100%; color: var(--primary-text); outline: none; font-size: 14px; margin-left: 10px; }

        #contentWrapper { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
        
        /* HOME VERSE */
        #homeArea { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 300px; }
        .verse-box { background: var(--accent); padding: 35px 25px; border-radius: 35px; text-align: center; color: white; width: 100%; box-shadow: 0 10px 25px rgba(176,141,109,0.3); }

        /* LISTS */
        .song-row { background: var(--card-bg); padding: 15px; border-radius: 18px; margin-bottom: 8px; display: flex; align-items: center; border: 1px solid var(--border); cursor: pointer; }
        .song-no { font-weight: 800; color: var(--accent); width: 45px; }

        /* SCREENS */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--app-bg); z-index: 100; display: none; flex-direction: column; }
        .screen-header { padding: 18px 25px; background: #1e293b; color: white; display: flex; justify-content: space-between; align-items: center; }
        
        /* LYRICS TOOLS */
        .lyrics-bar { display: flex; justify-content: space-between; padding: 12px 25px; background: var(--card-bg); border-bottom: 1px solid var(--border); }
        .tool-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--app-bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }

        /* ADMIN PANEL */
        .adm-card { background: var(--card-bg); padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border); text-align: left; }
        .adm-input { width: 100%; padding: 10px; margin: 5px 0 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--app-bg); box-sizing: border-box; }
        .btn-ui { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; margin-bottom: 5px; }

        /* WIDGET NAVIGATION */
        .widget-card { background: var(--card-bg); margin: 0 20px 10px; padding: 10px; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .w-btn { text-align: center; cursor: pointer; flex: 1; }
        .w-icon-box { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 4px; font-size: 1.1rem; }
        .bg-home { background: #fff1f1; color: #ff4d4d; }
        .bg-songs { background: #f0f7ff; color: #3b82f6; }
        .bg-cats { background: #fff9f0; color: #f59e0b; }
        .bg-favs { background: #f0fff4; color: #22c55e; }
        .bg-info { background: #e0f2fe; color: #0ea5e9; }
        .w-label { font-size: 7px; font-weight: 800; text-transform: uppercase; color: var(--secondary-text); }
        .footer { padding-bottom: 15px; text-align: center; font-size: 9px; color: #94a3b8; font-weight: 700; text-transform: uppercase; }

        /* PIN MODAL */
        #pinModal { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index: 1000; display:none; align-items:center; justify-content:center; backdrop-filter: blur(4px); }
        .modal-inner { background:var(--card-bg); width:75%; padding:30px; border-radius:30px; text-align:center; }
    </style>
</head>
<body onload="initApp()">

<div class="app-shell">
    <div class="top-nav">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span style="font-weight:800; font-size:1.1rem;">KAIPENG HLA BU</span>
            <span onclick="document.body.classList.toggle('dark-mode')" style="cursor:pointer">🌓</span>
        </div>
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="Search number or name..." onkeyup="filterSongs()">
        </div>
    </div>

    <div id="contentWrapper">
        <main id="homeArea">
            <div class="verse-box">
                <div id="vTxt" class="v-text"></div>
                <div id="vRef" style="font-size:0.8rem; opacity:0.8;"></div>
            </div>
        </main>
        <main id="mainDisplay" style="display:none;"></main>
    </div>

    <div class="bottom-nav">
        <div class="widget-card">
            <div class="w-btn" onclick="goHome()"><div class="w-icon-box bg-home">🏠</div><div class="w-label">Home</div></div>
            <div class="w-btn" onclick="renderSongs(allSongs)"><div class="w-icon-box bg-songs">🎶</div><div class="w-label">Songs</div></div>
            <div class="w-btn" onclick="renderCategories()"><div class="w-icon-box bg-cats">📂</div><div class="w-label">Cats</div></div>
            <div class="w-btn" onclick="renderFavourites()"><div class="w-icon-box bg-favs">⭐</div><div class="w-label">Favs</div></div>
            <div class="w-btn" onclick="openInfo()"><div class="w-icon-box bg-info">📞</div><div class="w-label">Info</div></div>
        </div>
        <footer class="footer">© 2026 KAIPENG HLA BU | KAIPENG EDITION</footer>
    </div>

    <div id="lyricScreen" class="screen">
        <div class="screen-header"><h3 id="lTitle" style="font-size:0.9rem;margin:0;"></h3><button onclick="closeScreens()">✕</button></div>
        <div class="lyrics-bar">
            <div class="tool-btn" onclick="navSong(-1)">←</div>
            <div class="tool-btn" onclick="zoom(-2)">A-</div>
            <div class="tool-btn" onclick="zoom(2)">A+</div>
            <div class="tool-btn" id="favIco" onclick="toggleFav()">❤</div>
            <div class="tool-btn" onclick="navSong(1)">→</div>
        </div>
        <div id="lContent" style="flex:1; overflow-y:auto; padding:30px; text-align:center; white-space:pre-wrap; font-family:'Crimson Pro'; line-height:1.6;"></div>
        <footer class="footer">© 2026 KRISTIAN HLA BU | KAIPENG EDITION</footer>
    </div>

    <div id="infoScreen" class="screen">
        <div class="screen-header"><h3>Settings</h3><button onclick="closeScreens()">✕</button></div>
        <div style="padding:20px; flex:1; overflow-y:auto; text-align:center;">
            <p><b>Developer:</b> Elizar Kaipeng (Admin)</p>
            <button class="btn-ui" id="loginBtn" style="background:#1e293b; color:white; width:auto; padding:10px 30px;" onclick="showPinModal()">Admin Login</button>
            <div id="adminArea" style="display:none;">
                <div class="adm-card">
                    <h4>Verse Editor</h4>
                    <input id="evT" class="adm-input" placeholder="Verse Text"><input id="evR" class="adm-input" placeholder="Ref">
                    <button class="btn-ui" style="background:var(--accent); color:white;" onclick="updateVerse()">Update Home Verse</button>
                </div>
                <div class="adm-card">
                    <h4>Category Manager</h4>
                    <div id="catManList" style="font-size:12px; margin-bottom:10px;"></div>
                    <input id="newC" class="adm-input" placeholder="Category Name">
                    <button class="btn-ui" style="background:var(--accent); color:white;" onclick="addCat()">Add</button>
                </div>
                <div class="adm-card">
                    <h4>Song Editor</h4>
                    <input type="hidden" id="editIdx" value="-1">
                    <input id="sn" class="adm-input" placeholder="Number"><input id="st" class="adm-input" placeholder="Title">
                    <select id="sc" class="adm-input"></select><textarea id="sl" class="adm-input" rows="4" placeholder="Lyrics"></textarea>
                    <button class="btn-ui" id="saveS" style="background:#1e293b; color:white;" onclick="saveSong()">Save Song</button>
                    <button class="btn-ui" id="delS" style="background:#fee2e2; color:#ef4444; display:none;" onclick="deleteSong()">Delete</button>
                </div>
                <div class="adm-card">
                    <h4>Data</h4>
                    <button class="btn-ui" style="background:#10b981; color:white;" onclick="exportData()">Export Backup</button>
                    <input type="file" onchange="importData(event)" style="font-size:10px;">
                </div>
            </div>
        </div>
    </div>

    <div id="pinModal">
        <div class="modal-inner">
            <h3>Only for Admin</h3>
            <input type="password" id="pinInput" maxlength="4" style="width:100%; font-size:2rem; text-align:center; border:none; border-bottom:2px solid var(--accent); margin:20px 0; outline:none; letter-spacing:10px;">
            <div style="display:flex; gap:10px;"><button onclick="closeScreens()" style="flex:1; padding:12px; border-radius:10px; border:none;">Cancel</button>
            <button onclick="verifyPin()" style="flex:1; padding:12px; border-radius:10px; border:none; background:#1e293b; color:white;">Login</button></div>
        </div>
    </div>
</div>

<script>
    let allSongs = JSON.parse(localStorage.getItem('kp_songs')) || [];
    let categories = JSON.parse(localStorage.getItem('kp_cats')) || ["Hymns", "Choir"];
    let homeVerse = JSON.parse(localStorage.getItem('kp_verse')) || { text: "The Lord is my shepherd; I shall not want.", ref: "Psalm 23:1" };
    let curIdx = -1, fSize = 20;

    function initApp() {
        document.getElementById('vTxt').innerText = homeVerse.text;
        document.getElementById('vRef').innerText = homeVerse.ref;
        refreshCats();
    }

    function closeScreens() { document.querySelectorAll('.screen').forEach(s => s.style.display='none'); document.getElementById('pinModal').style.display='none'; }
    function goHome() { closeScreens(); document.getElementById('homeArea').style.display='flex'; document.getElementById('mainDisplay').style.display='none'; }
    function openInfo() { closeScreens(); document.getElementById('infoScreen').style.display='flex'; }
    function showPinModal() { document.getElementById('pinModal').style.display='flex'; document.getElementById('pinInput').focus(); }

    function verifyPin() {
        if(document.getElementById('pinInput').value === "1234") {
            document.getElementById('adminArea').style.display = 'block';
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('pinModal').style.display = 'none';
            document.getElementById('evT').value = homeVerse.text; document.getElementById('evR').value = homeVerse.ref;
        } else { alert("Invalid PIN"); }
    }

    function updateVerse() {
        homeVerse = { text: document.getElementById('evT').value, ref: document.getElementById('evR').value };
        localStorage.setItem('kp_verse', JSON.stringify(homeVerse)); initApp(); alert("Verse Updated");
    }

    function refreshCats() {
        document.getElementById('sc').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('catManList').innerHTML = categories.map((c, i) => `<div style="display:flex; justify-content:space-between;"><span>${c}</span><span style="color:red; cursor:pointer;" onclick="delCat(${i})">Delete</span></div>`).join('');
    }

    function addCat() {
        let val = document.getElementById('newC').value;
        if(val) { categories.push(val); localStorage.setItem('kp_cats', JSON.stringify(categories)); refreshCats(); document.getElementById('newC').value=''; }
    }

    function delCat(i) { categories.splice(i,1); localStorage.setItem('kp_cats', JSON.stringify(categories)); refreshCats(); }

    function saveSong() {
        let idx = parseInt(document.getElementById('editIdx').value);
        let s = { no: document.getElementById('sn').value, title: document.getElementById('st').value, cat: document.getElementById('sc').value, lyrics: document.getElementById('sl').value, fav: idx > -1 ? allSongs[idx].fav : false };
        if(idx > -1) allSongs[idx] = s; else allSongs.push(s);
        localStorage.setItem('kp_songs', JSON.stringify(allSongs));
        resetForm(); alert("Saved"); renderSongs(allSongs);
    }

    function deleteSong() { let idx = document.getElementById('editIdx').value; allSongs.splice(idx,1); localStorage.setItem('kp_songs', JSON.stringify(allSongs)); resetForm(); renderSongs(allSongs); }
    function resetForm() { document.getElementById('editIdx').value = "-1"; document.getElementById('sn').value = ""; document.getElementById('st').value = ""; document.getElementById('sl').value = ""; document.getElementById('delS').style.display='none'; }

    function renderSongs(list) {
        closeScreens(); document.getElementById('homeArea').style.display='none';
        const d = document.getElementById('mainDisplay'); d.style.display='block';
        d.innerHTML = `<h4 style="color:var(--accent); font-size:0.8rem;">${list.length} Songs</h4>`;
        list.forEach(s => {
            const realIdx = allSongs.indexOf(s);
            const div = document.createElement('div'); div.className = 'song-row';
            div.innerHTML = `<div class="song-no">${s.no}</div><div style="flex:1"><b>${s.title}</b><br><small>${s.cat}</small></div>`;
            div.onclick = () => openLyrics(realIdx);
            if(document.getElementById('adminArea').style.display === 'block') {
                let eb = document.createElement('span'); eb.innerText = "Edit"; eb.style.fontSize="10px"; eb.style.color="var(--accent)";
                eb.onclick = (e) => { e.stopPropagation(); loadEdit(realIdx); };
                div.appendChild(eb);
            }
            d.appendChild(div);
        });
    }

    function loadEdit(idx) {
        let s = allSongs[idx]; document.getElementById('editIdx').value = idx;
        document.getElementById('sn').value = s.no; document.getElementById('st').value = s.title;
        document.getElementById('sc').value = s.cat; document.getElementById('sl').value = s.lyrics;
        document.getElementById('delS').style.display='block'; openInfo();
    }

    function renderCategories() {
        closeScreens(); document.getElementById('homeArea').style.display='none';
        const d = document.getElementById('mainDisplay'); d.style.display='block'; d.innerHTML = '<h4>Categories</h4>';
        categories.forEach(c => {
            const div = document.createElement('div'); div.className = 'song-row'; div.innerHTML = `📂 <b>${c}</b>`;
            div.onclick = () => renderSongs(allSongs.filter(s => s.cat === c));
            d.appendChild(div);
        });
    }

    function renderFavourites() { renderSongs(allSongs.filter(s => s.fav)); }

    function openLyrics(idx) {
        curIdx = idx; let s = allSongs[idx];
        document.getElementById('lTitle').innerText = "#" + s.no + " " + s.title;
        document.getElementById('lContent').innerText = s.lyrics;
        document.getElementById('lContent').style.fontSize = fSize + "px";
        document.getElementById('lyricScreen').style.display = 'flex';
        updateFavIcon();
    }

    function navSong(dir) { let n = curIdx + dir; if(n >= 0 && n < allSongs.length) openLyrics(n); }
    function zoom(v) { fSize += v; document.getElementById('lContent').style.fontSize = fSize + "px"; }
    function toggleFav() { allSongs[curIdx].fav = !allSongs[curIdx].fav; localStorage.setItem('kp_songs', JSON.stringify(allSongs)); updateFavIcon(); }
    function updateFavIcon() { document.getElementById('favIco').style.color = allSongs[curIdx].fav ? "#ff4d4d" : "var(--primary-text)"; }

    function filterSongs() {
        let v = document.getElementById('searchInput').value.toLowerCase();
        if(!v) return goHome();
        renderSongs(allSongs.filter(s => s.no.includes(v) || s.title.toLowerCase().includes(v)));
    }

    function exportData() {
        const b = new Blob([JSON.stringify({songs:allSongs, cats:categories, verse:homeVerse})], {type:"application/json"});
        const a = document.createElement("a"); a.href=URL.createObjectURL(b); a.download="hlabu_backup.json"; a.click();
    }

    function importData(event) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const d = JSON.parse(e.target.result);
            allSongs = d.songs; categories = d.cats; homeVerse = d.verse;
            localStorage.setItem('kp_songs', JSON.stringify(allSongs));
            localStorage.setItem('kp_cats', JSON.stringify(categories));
            localStorage.setItem('kp_verse', JSON.stringify(homeVerse));
            location.reload();
        };
        reader.readAsText(event.target.files[0]);
    }
</script>
</body>
                        </html>
