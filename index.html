<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAIPENG HLA BU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Crimson+Pro:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --app-bg: #f8fafc; --card-bg: #ffffff; --primary-text: #1e293b;
            --secondary-text: #64748b; --accent: #b08d6d; --border: #f1f5f9;
        }
        .dark-mode {
            --app-bg: #0f172a; --card-bg: #1e293b; --primary-text: #f1f5f9;
            --secondary-text: #94a3b8; --border: #334155;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #2c3e50; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100dvh; 
            overflow: hidden; 
            color: var(--primary-text); 
        }

        .app-shell { 
            width: 100%; 
            max-width: 450px; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            background: var(--app-bg); 
            position: relative; 
            padding-bottom: env(safe-area-inset-bottom);
        }

        .top-nav { padding: 20px 20px 5px; }
        .search-box { background: var(--card-bg); border-radius: 18px; padding: 12px 18px; display: flex; align-items: center; border: 1px solid var(--border); }
        .search-box input { border: none; background: transparent; width: 100%; color: var(--primary-text); outline: none; margin-left: 10px; }

        #contentWrapper { flex: 1; overflow-y: auto; padding: 0 20px 10px; }
        
        #homeSection { height: 100%; display: flex; align-items: center; justify-content: center; text-align: center; }
        .verse-box { background: var(--accent); padding: 35px 25px; border-radius: 35px; color: white; width: 100%; }

        .song-row { background: var(--card-bg); padding: 15px; border-radius: 18px; margin-bottom: 8px; display: flex; align-items: center; border: 1px solid var(--border); cursor: pointer; }
        .song-no { font-weight: 800; color: var(--accent); width: 45px; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--app-bg); z-index: 100; display: none; flex-direction: column; }
        .screen-header { padding: 18px 25px; background: #1e293b; color: white; display: flex; justify-content: space-between; align-items: center; }

        .lyrics-bar { display: flex; justify-content: space-between; padding: 12px 25px; background: var(--card-bg); border-bottom: 1px solid var(--border); align-items: center;}
        .tool-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--app-bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }

        /* FOOTER STYLE */
        .lyric-footer {
            padding: 15px;
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            color: var(--secondary-text);
            border-top: 1px solid var(--border);
            background: var(--card-bg);
            letter-spacing: 0.5px;
        }

        .widget-card { 
            background: var(--card-bg); 
            margin: 5px 15px 15px; 
            padding: 12px 5px; 
            border-radius: 25px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            border: 1px solid var(--border); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            z-index: 50;
        }
        .w-btn { text-align: center; cursor: pointer; flex: 1; }
        .w-icon-box { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 4px; font-size: 1.2rem; }
        .bg-home { background: #fff1f1; color: #ff4d4d; }
        .bg-songs { background: #f0f7ff; color: #3b82f6; }
        .bg-cats { background: #fff9f0; color: #f59e0b; }
        .bg-favs { background: #f0fff4; color: #22c55e; }
        .bg-info { background: #e0f2fe; color: #0ea5e9; }
        .w-label { font-size: 8px; font-weight: 800; text-transform: uppercase; color: var(--secondary-text); }

        .modal-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index: 1000; display:none; align-items:center; justify-content:center; backdrop-filter: blur(4px); }
        .modal-box { background:var(--card-bg); width: 85%; padding: 25px; border-radius: 30px; max-height: 80vh; overflow-y: auto; }

        .btn-ui { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
        .adm-input { width: 100%; padding: 12px; margin: 5px 0 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--app-bg); color: var(--primary-text); box-sizing: border-box; }
        .adm-card { background: var(--card-bg); padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .cat-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--app-bg); border-radius: 10px; margin-bottom: 5px; border: 1px solid var(--border); }
    </style>
</head>
<body onload="initApp()">

<div class="app-shell">
    <div class="top-nav">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items: center;">
            <span style="font-weight:800; font-size:1.1rem;">kaipeng HLA BU</span>
            <span onclick="document.body.classList.toggle('dark-mode')" style="cursor:pointer; font-size: 1.2rem;">🌓</span>
        </div>
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="Search number or title..." onkeyup="handleSearch()">
        </div>
    </div>

    <div id="contentWrapper">
        <div id="homeSection">
            <div class="verse-box">
                <div id="vTxt" style="font-family:'Crimson Pro'; font-size:1.4rem; font-style:italic; margin-bottom:10px;"></div>
                <div id="vRef" style="font-size:0.8rem; opacity:0.8;"></div>
            </div>
        </div>
        <div id="listSection" style="display:none;"></div>
    </div>

    <div class="widget-card">
        <div class="w-btn" onclick="navTo('home')"><div class="w-icon-box bg-home">🏠</div><div class="w-label">Home</div></div>
        <div class="w-btn" onclick="navTo('songs')"><div class="w-icon-box bg-songs">🎶</div><div class="w-label">Songs</div></div>
        <div class="w-btn" onclick="navTo('cats')"><div class="w-icon-box bg-cats">📂</div><div class="w-label">Category</div></div>
        <div class="w-btn" onclick="navTo('favs')"><div class="w-icon-box bg-favs">⭐</div><div class="w-label">Favourite</div></div>
        <div class="w-btn" onclick="navTo('info')"><div class="w-icon-box bg-info">ℹ️</div><div class="w-label">Info</div></div>
    </div>

    <div id="lyricScreen" class="screen">
        <div class="screen-header">
            <h3 id="lTitle" style="font-size:0.9rem;margin:0;"></h3>
            <button onclick="hideScreens()" style="background:none; border:none; color:white; font-size:1.5rem;">✕</button>
        </div>
        <div class="lyrics-bar">
            <div class="tool-btn" onclick="moveSong(-1)">←</div>
            <div class="tool-btn" onclick="changeZoom(-2)">A-</div>
            <div class="tool-btn" onclick="changeZoom(2)">A+</div>
            <div class="tool-btn" id="favBtnView" onclick="toggleFavFromView()">❤</div>
            <div class="tool-btn" onclick="moveSong(1)">→</div>
        </div>
        <div id="lContent" style="flex:1; overflow-y:auto; padding:30px; text-align:center; white-space:pre-wrap; font-family:'Crimson Pro'; line-height:1.6; font-size:20px;"></div>
        
        <div class="lyric-footer">
            © 2026 KRISTIAN HLA BU | KAIPENG EDITION
        </div>
    </div>

    <div id="infoScreen" class="screen">
        <div class="screen-header"><h3>Settings</h3><button onclick="hideScreens()" style="background:none; border:none; color:white; font-size:1.5rem;">✕</button></div>
        <div style="padding:20px; overflow-y:auto;">
            <p style="text-align:center;">Improvement suggestions:</p>
            <button class="btn-ui" style="background:#25D366; color:white;" onclick="window.open('https://wa.me/919361094788')">WhatsApp Developer</button>
            
            <div id="adminGate" style="margin-top:20px;">
                <button class="btn-ui" style="background:#1e293b; color:white;" onclick="openModal('pinModal')">Admin Panel</button>
            </div>

            <div id="adminPanel" style="display:none; margin-top:15px;">
                <button class="btn-ui" style="background:#b08d6d; color:white;" onclick="openEditor(-1)">+ Add New Song</button>
                <div class="adm-card">
                    <h4>Home Verse</h4>
                    <input id="vTextIn" class="adm-input" placeholder="Verse..."><input id="vRefIn" class="adm-input" placeholder="Ref...">
                    <button class="btn-ui" style="background:#1e293b; color:white;" onclick="saveVerse()">Update Verse</button>
                </div>
                <div class="adm-card">
                    <h4>Category Manager</h4>
                    <div id="catList"></div>
                    <input id="catIn" class="adm-input" placeholder="New category..."><button class="btn-ui" style="background:#1e293b; color:white;" onclick="addCat()">Add</button>
                </div>
                <div class="adm-card">
                    <h4>Backup</h4>
                    <button class="btn-ui" style="background:#10b981; color:white;" onclick="exportData()">Export (.json)</button>
                    <input type="file" id="fileIn" onchange="importData(event)" style="display:none">
                    <button class="btn-ui" style="background:#64748b; color:white;" onclick="document.getElementById('fileIn').click()">Import</button>
                </div>
                <button class="btn-ui" style="background:#ef4444; color:white;" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <div id="pinModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Admin Access</h3>
            <input type="password" id="pinIn" maxlength="4" style="width:100%; font-size:2rem; text-align:center; border-bottom:2px solid var(--accent); margin-bottom:20px; outline:none; border:none; background:transparent;">
            <button onclick="login()" class="btn-ui" style="background:#1e293b; color:white;">Login</button>
            <button onclick="closeModal('pinModal')" class="btn-ui">Cancel</button>
        </div>
    </div>

    <div id="songModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="edTitle">Add Song</h3>
            <input type="hidden" id="edIdx" value="-1">
            <input id="edNo" class="adm-input" placeholder="No."><input id="edT" class="adm-input" placeholder="Title">
            <select id="edC" class="adm-input"></select>
            <textarea id="edL" class="adm-input" rows="6" placeholder="Lyrics..."></textarea>
            <button onclick="saveSong()" class="btn-ui" style="background:#1e293b; color:white;">Save</button>
            <button id="edDel" onclick="delSong()" class="btn-ui" style="background:#ef4444; color:white; display:none;">Delete</button>
            <button onclick="closeModal('songModal')" class="btn-ui">Cancel</button>
        </div>
    </div>
</div>

<script>
    let songs = JSON.parse(localStorage.getItem('kp_songs')) || [];
    let cats = JSON.parse(localStorage.getItem('kp_cats')) || ["Hymns", "Choir"];
    let verse = JSON.parse(localStorage.getItem('kp_verse')) || { text: "The Lord is my shepherd.", ref: "Psalm 23:1" };
    let isAdmin = false, curIdx = -1, zoom = 20;

    function initApp() {
        document.getElementById('vTxt').innerText = verse.text;
        document.getElementById('vRef').innerText = verse.ref;
        document.getElementById('vTextIn').value = verse.text;
        document.getElementById('vRefIn').value = verse.ref;
        updateCatUI();
    }

    function navTo(page) {
        document.getElementById('homeSection').style.display = 'none';
        document.getElementById('listSection').style.display = 'none';
        hideScreens();
        if (page === 'home') document.getElementById('homeSection').style.display = 'flex';
        else if (page === 'songs') renderList(songs, "All Songs");
        else if (page === 'cats') renderCats();
        else if (page === 'favs') renderList(songs.filter(s => s.fav), "Favourites");
        else if (page === 'info') document.getElementById('infoScreen').style.display = 'flex';
    }

    function renderList(list, title) {
        const div = document.getElementById('listSection'); div.style.display = 'block';
        div.innerHTML = `<h4>${title} (${list.length})</h4>`;
        list.forEach(s => {
            const row = document.createElement('div'); row.className = 'song-row';
            row.innerHTML = `<div class="song-no">${s.no}</div><div style="flex:1"><b>${s.title}</b><br><small>${s.cat}</small></div>`;
            row.onclick = () => openView(songs.indexOf(s));
            if(isAdmin) {
                let eB = document.createElement('button'); eB.innerText = "✎"; eB.style.border="none"; eB.style.background="none"; eB.style.fontSize="1.2rem";
                eB.onclick = (e) => { e.stopPropagation(); openEditor(songs.indexOf(s)); };
                row.appendChild(eB);
            }
            div.appendChild(row);
        });
    }

    function renderCats() {
        const div = document.getElementById('listSection'); div.style.display = 'block';
        div.innerHTML = `<h4>Categories</h4>`;
        cats.forEach(c => {
            const row = document.createElement('div'); row.className = 'song-row';
            row.innerHTML = `📂 <b style="margin-left:15px">${c}</b>`;
            row.onclick = () => renderList(songs.filter(s => s.cat === c), c);
            div.appendChild(row);
        });
    }

    function openView(idx) {
        curIdx = idx; const s = songs[idx];
        document.getElementById('lTitle').innerText = "#" + s.no + " " + s.title;
        document.getElementById('lContent').innerText = s.lyrics;
        document.getElementById('lContent').style.fontSize = zoom + "px";
        document.getElementById('favBtnView').style.color = s.fav ? "red" : "#ccc";
        document.getElementById('lyricScreen').style.display = 'flex';
    }
    function moveSong(dir) { let n = curIdx + dir; if (n >= 0 && n < songs.length) openView(n); }
    function changeZoom(v) { zoom += v; document.getElementById('lContent').style.fontSize = zoom + "px"; }
    function toggleFavFromView() { songs[curIdx].fav = !songs[curIdx].fav; localStorage.setItem('kp_songs', JSON.stringify(songs)); openView(curIdx); }

    function login() {
        if(document.getElementById('pinIn').value === "1234") {
            isAdmin = true; document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('adminGate').style.display = 'none'; closeModal('pinModal');
        } else { alert("Wrong PIN"); }
        document.getElementById('pinIn').value = "";
    }
    function logout() { isAdmin = false; document.getElementById('adminPanel').style.display = 'none'; document.getElementById('adminGate').style.display = 'block'; navTo('home'); }
    function saveVerse() { verse = { text: document.getElementById('vTextIn').value, ref: document.getElementById('vRefIn').value }; localStorage.setItem('kp_verse', JSON.stringify(verse)); initApp(); alert("Home Verse Updated"); }

    function updateCatUI() {
        document.getElementById('edC').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('catList').innerHTML = cats.map((c, i) => `
            <div class="cat-item"><span>${c}</span>
                <div><button onclick="editCat(${i})" style="border:none; background:none;">✎</button>
                <button onclick="delCat(${i})" style="border:none; background:none; color:red; margin-left:10px;">✕</button></div>
            </div>`).join('');
    }
    function addCat() { let v = document.getElementById('catIn').value; if(v){ cats.push(v); localStorage.setItem('kp_cats', JSON.stringify(cats)); updateCatUI(); document.getElementById('catIn').value=''; }}
    function editCat(i) { let n = prompt("Rename:", cats[i]); if(n){ cats[i]=n; localStorage.setItem('kp_cats', JSON.stringify(cats)); updateCatUI(); }}
    function delCat(i) { if(confirm("Delete?")){ cats.splice(i,1); localStorage.setItem('kp_cats', JSON.stringify(cats)); updateCatUI(); }}

    function openEditor(idx) {
        document.getElementById('edIdx').value = idx;
        if(idx > -1) {
            let s = songs[idx]; document.getElementById('edTitle').innerText = "Edit Song";
            document.getElementById('edNo').value = s.no; document.getElementById('edT').value = s.title;
            document.getElementById('edC').value = s.cat; document.getElementById('edL').value = s.lyrics;
            document.getElementById('edDel').style.display = 'block';
        } else {
            document.getElementById('edTitle').innerText = "Add Song";
            document.getElementById('edNo').value = ""; document.getElementById('edT').value = "";
            document.getElementById('edL').value = ""; document.getElementById('edDel').style.display = 'none';
        }
        openModal('songModal');
    }
    function saveSong() {
        let idx = parseInt(document.getElementById('edIdx').value);
        let s = { no: document.getElementById('edNo').value, title: document.getElementById('edT').value, cat: document.getElementById('edC').value, lyrics: document.getElementById('edL').value, fav: idx > -1 ? songs[idx].fav : false };
        if(!s.no || !s.title) return alert("Fill fields");
        if(idx > -1) songs[idx] = s; else songs.push(s);
        localStorage.setItem('kp_songs', JSON.stringify(songs)); closeModal('songModal'); renderList(songs, "All Songs");
    }
    function delSong() { let idx = document.getElementById('edIdx').value; if(confirm("Delete?")){ songs.splice(idx,1); localStorage.setItem('kp_songs', JSON.stringify(songs)); closeModal('songModal'); renderList(songs, "All Songs"); }}

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function hideScreens() { document.getElementById('lyricScreen').style.display = 'none'; document.getElementById('infoScreen').style.display = 'none'; }
    function handleSearch() { let v = document.getElementById('searchInput').value.toLowerCase(); if(v) renderList(songs.filter(s => s.no.includes(v) || s.title.toLowerCase().includes(v)), "Search Results"); }
    function exportData() {
        const b = new Blob([JSON.stringify({songs, cats, verse})], {type:"application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "song_backup.json"; a.click();
    }
    function importData(e) {
        const r = new FileReader(); r.onload = (ev) => {
            const d = JSON.parse(ev.target.result); songs = d.songs; cats = d.cats; verse = d.verse;
            localStorage.setItem('kp_songs', JSON.stringify(songs)); localStorage.setItem('kp_cats', JSON.stringify(cats)); localStorage.setItem('kp_verse', JSON.stringify(verse));
            location.reload();
        }; r.readAsText(e.target.files[0]);
    }
</script>
</body>
                                                                     </html>
